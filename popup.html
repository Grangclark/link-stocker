<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; font-family: sans-serif; padding: 12px; margin: 0; background-color: #f8f9fa; }
    h3 { margin-top: 0; color: #343a40; border-bottom: 2px solid #dee2e6; padding-bottom: 6px; }
    
    /* 大砲ボタンのデザイン */
    #open-all-btn { 
      width: 100%; padding: 10px; font-size: 15px; font-weight: bold; 
      color: #fff; background-color: #007bff; border: none; border-radius: 6px; 
      cursor: pointer; margin-bottom: 12px; transition: background 0.2s;
    }
    #open-all-btn:hover { background-color: #0056b3; }
    #open-all-btn:disabled { background-color: #6c757d; cursor: not-allowed; }

    /* リストのデザイン */
    ul { list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto; }
    li { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 8px; background: #fff; border: 1px solid #ced4da; 
      border-radius: 4px; margin-bottom: 6px; font-size: 12px;
    }
    .link-text { 
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
      width: 240px; color: #495057; text-decoration: none;
    }
    .link-text:hover { text-decoration: underline; color: #007bff; }
    
    /* 個別削除用のバツボタン */
    .delete-btn { 
      cursor: pointer; color: #dc3545; font-weight: bold; 
      font-size: 14px; padding: 0 4px; user-select: none; 
    }
    
    #empty-message { text-align: center; color: #6c757d; padding: 20px 0; }
  </style>
</head>
<body>
  <h3>LinkStocker 📥</h3>
  <button id="open-all-btn" disabled>一括で全部開く！🚀</button>
  
  <p id="empty-message">ストックされたリンクはありません</p>
  <ul id="link-list"></ul>

  <script src="popup.js"></script>
</body>
</html>
